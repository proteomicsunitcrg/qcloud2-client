<p>Users enabled in this node: {{usersEnabled}}</p>
<p>Users in this node: {{users.length}}</p>
<table>
    <thead>
        <th>
            Role
        </th>
        <th>
            Email
        </th>
        <th>
            Name
        </th>
        <th>
            Lastname
        </th>
        <th>
            Api Key
        </th>
        <th>
            Enabled
        </th>
        <th>
            Reset password
        </th>
        <th>
            Convert to
        </th>
    </thead>
    <tbody>
        <tr *ngFor="let user of users">
            <td>
                <img src="assets/icons/god.svg" alt="Admin" style="width: 25%;" *ngIf="user.authorities.length === 3">
                <img src="assets/icons/ruby.svg" alt="Manager" style="width: 25%;"
                    *ngIf="user.authorities.length === 2">
                <img src="assets/icons/coal.svg" alt="" style="width: 25%;" *ngIf="user.authorities.length === 1">
            </td>
            <td>
                {{user.username}}
            </td>
            <td>
                {{user.firstname}}
            </td>
            <td>
                {{user.lastname}}
            </td>
            <td>
                {{user.apiKey}}
            </td>
            <td class="isLink cursorIcon" (click)="enableDisableUser(user.apiKey)">
                {{user.enabled}}
            </td>
            <td style="position: relative;">
                <button class="btn" (click)="resetPassword(user)">Reset</button>
            </td>
            <td>
                <button class="btn" *ngIf="user.authorities.length === 3"
                    (click)="giveRemoveAdmin(user.apiKey)">Normal</button>
                <button class="btn" *ngIf="user.authorities.length !== 3"
                    (click)="giveRemoveAdmin(user.apiKey)">Admin</button>
            </td>
        </tr>
    </tbody>
</table>
