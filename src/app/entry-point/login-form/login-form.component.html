<div class="container">
  <div class="row">
    <div class="col s6 offset-s3 z-depth-1" id="panell">
      <h5 id="title">QCloud 2.0</h5>
      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" ngNativeValidate>
        <div class="input-field">
          <input type="text" name="username" [(ngModel)]="username" id="username" required>
          <label for="username">Username</label>
        </div>
        <div class="input-field">
          <input type="password" id="password" [(ngModel)]="password" name="password" required>
          <label for="password">Password</label>
          <span class="helper-text" data-error="wrong" data-success="right">{{serverOutput}}</span>
        </div>
        <button type="submit" class="right waves-effect waves-light btn" id="loginbtn" [disabled]="!loginForm.form.valid">Login</button>
      </form>
    </div>    
  </div>
  <div class="row">
      <div class="col s6 offset-s3 z-depth-0">
        <a routerLink="/register" id="registerLink" class="left">Register node</a>
        <a id="recoverLink" class="right">Password recovery</a>
      </div>
  </div>


<div class="row">
  	<div class="col s6 offset-s3">
  		<button type="button" (click)="doLogout()" class="btn">Logout</button>
      <button type="button" (click)="doTest()" class="btn" >Test</button>  	
      <button type="button" (click)="doInternalTest()" class="btn" >Test internal</button>  	
  	</div>  
  </div>

</div>
