<div class="container">
  <div class="row">
    <div class="col s6 offset-s3 z-depth-1" id="panell">
      <img class = "responsive-img"src="assets/images/logo-qcloud.png" alt="" srcset="" style="background-color: #ffffff;">
      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" ngNativeValidate>
        <div class="input-field">
          <input type="text" name="username" [(ngModel)]="username" id="username" required>
          <label for="username">Username</label>
        </div>
        <div class="input-field">
          <input type="password" id="password" [(ngModel)]="password" name="password" required>
          <label for="password">Password</label>
          <span [ngClass]="{'helper-text': isBad}" class="helper-text" data-error="wrong" data-success="right" style="font-size: 15px;">{{serverOutput}}</span>
        </div>
        <button type="submit" class="right waves-effect waves-light btn" id="loginbtn" [disabled]="!loginForm.form.valid">Login</button>
      </form>
    </div>
  </div>
  <div class="row">
    <div class="col s6 offset-s3 z-depth-0">
      <a routerLink="/register" id="registerLink" class="left greenLink">Sign up</a>
      <a id="recoverLink" routerLink="/recovery" class="right greenLink">Password recovery</a>
    </div>
  </div>
