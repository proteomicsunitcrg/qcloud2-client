<div class="col s12 m10 l10 xl10 z-depth-2">
  <div class="row z-depth-0 green-background  ">
    <div class="col s12 m12 l12 xl12">
      <h4>Automatic guide sets management</h4>
    </div>
  </div>
  <div class="row">
    <div class="col s12 m12 l12 xl12">
      <div class="input-field">
        <input placeholder="10" id="max_points" type="number" [(ngModel)]="files" class="validate">
        <label for="max_points">Max points for automatic threshold</label>
      </div>
      <div class="col s12 m12 l12 xl12">
        <a class="waves-effect waves-light btn" (click)="doSetAutomaticGuideSet()">Set automatic guide set</a>
      </div>
    </div>
  </div>
