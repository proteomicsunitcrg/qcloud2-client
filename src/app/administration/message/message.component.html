<div class="col s12 m10 l10 xl10 z-depth-2">
  <div class="row z-depth-0 green-background  ">
    <div class="col s12 m12 l12 xl12">
      <h4>Manage messages</h4>
    </div>
  </div>
  <a class="btn-floating waves-effect waves-light right" (click)="newMsg()">
    <i class="material-icons">add</i>
  </a>
  <div class="row">
    <div class="col m2 xl2 l2 s2">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Priority</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let message of allMessages" (click)="goToMessage(message)" class="cursor">
            <td>
              {{message.title}}
            </td>
            <td>
              {{message.priority}}
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="col m10 xl10 l10 s10">
      <form [formGroup]="messageForm">
        <label>
          Message title
        </label>
        <input type="text" formControlName="title" placeholder="Title">
        <label>
          Message text
        </label>
        <textarea formControlName="message" id="msgText" class="materialize-textarea" placeholder="Text"></textarea>
        <div class="input-field">
          <select id="typeMsg" formControlName="type">
            <option value="default" disabled selected>Choose the message type</option>
            <option value="message">Message</option>
            <option value="warning">Warning</option>
            <option value="error">Error</option>
          </select>
          <label for="typeMsg">Choose the message type</label>
        </div>
        <label>
          Priority (0 means more priority)
        </label>
        <input type="number" formControlName="priority" placeholder="Priority">
        <div class="switch">
          <label>
            Off
            <input type="checkbox" formControlName="show">
            <span class="lever"></span>
            On
          </label>
        </div>
      </form>
      <div class="row">
        <div class="col s6 offset-s3 z-depth-1" id="panell">
          <h5 class="title titleWarning" *ngIf="messageForm.value.type === 'warning'">{{messageForm.value.title}}</h5>
          <h5 class="title titleError" *ngIf="messageForm.value.type === 'error'">{{messageForm.value.title}}</h5>
          <h5 class="title titleMessage" *ngIf="messageForm.value.type === 'message'">{{messageForm.value.title}}</h5>
          <p [innerHTML]="messageForm.value.message" class="messageText"></p>
        </div>
      </div>
      <button type="button" class="btn waves-effect waves-light" [disabled]="messageForm.invalid" id="saveButton"
        (click)="submit()">Save</button>
      <button type="button" class="btn waves-effect waves-light" [disabled]="messageForm.invalid" id="spamAll"
        (click)="spamAll()" style="margin: 20px;">Spam all</button>
      <button type="button" class="btn waves-effect waves-light" [disabled]="messageForm.invalid" id="spamManagers"
        (click)="spamAllManagers()" style="margin: 20px;">Spam all managers</button>
      <button type="button" class="btn waves-effect waves-light red" [disabled]="currentMessage == undefined" id="deleteMSG"
      (click)="deleteMSG()">Delete</button>
    </div>
  </div>
</div>
