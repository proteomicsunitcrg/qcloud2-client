<ul class="collection with-header" style="width: 300px; float: right;">
  <li class="collection-item contactList" *ngFor="let template of allTemplates">
    <a>{{template}}</a>
    <button class="waves-effect waves-light btn green-background" style="margin-left: 20px"
      (click)="loadTemplate(template)">Load</button>
  </li>
</ul>
