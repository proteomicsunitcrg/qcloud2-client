<h5>Parameter</h5>
<table class="highlight">
  <thead>
    <th>Paramenter</th>
  </thead>
  <tbody>
    <tr *ngFor="let parameter of parameters">
      <td [ngClass]="{'green-background lighten-3': parameter.qCCV===selectedParameter.qCCV}"
        (click)="selectParameter(parameter)">{{parameter.name}}</td>
    </tr>
  </tbody>
</table>
