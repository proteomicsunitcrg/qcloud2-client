<table>
  <thead>
    <tr>
      <th>
        Name
    </th>
    <th>
      For
    </th>
    <th>
      Sample type
    </th>
    <th>
      Actions
    </th>
    <th>
      Threshold
    </th>
  </tr>
  </thead>
  <tbody>
    <tr *ngFor="let chart of charts">
      <td>{{chart.name}}</td>
      <td>{{chart.cv.name}}</td>
      <td>{{chart.sampleType.name}}</td>
      <td>
          <i class="material-icons cursorIcon" (click)="editChart(chart)">edit</i>
          <i class="material-icons cursorIcon">delete_forever</i>
      </td>
      <td>
        <div class="switch">
          <label>
            Off
            <input type="checkbox" [(ngModel)]="chart.isThresholdEnabled" (change)="onIsThresholdChange(chart)">
            <span class="lever"></span>
            On
          </label>
        </div>
      </td>
    </tr>
  </tbody>
</table>
