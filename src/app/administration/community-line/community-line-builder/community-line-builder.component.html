<form (ngSubmit)="onSubmit()" #communityForm="ngForm">
  <div class="row">
    <div class="col s12 m6 l6 xl6">
      <!-- sample type -->
      <div class="input-field col s12">
        <select [(ngModel)]="communityLine.sampleType" name="sampleType" required>
          <option value="" disabled selected>Choose your option</option>
          <option *ngFor="let sampleType of sampleTypes" [ngValue]="sampleType">{{sampleType.name}}</option>
        </select>
        <label>Sample type</label>
      </div>
      <!-- name -->
      <div class="input-field col s12">
        <input type="text" name="name" id="nameInput" [(ngModel)]="communityLine.name" required>
        <label>Line name</label>
      </div>
      <!-- param -->
      <div class="input-field col s12">
        <select name="param" required [(ngModel)]="communityLine.param" (ngModelChange)="onParamChange($event)" >
          <option value="" disabled selected>Choose your option</option>
          <option *ngFor="let param of params" [ngValue]="param">{{param.name}}</option>
        </select>
        <label>Parameter</label>
      </div>
      <!-- context source  -->
      <div class="input-field col s12">
        <select name="cs" required [(ngModel)]="communityLine.contextSource" [disabled]="communityLine.param===null">
          <option value="" disabled selected>Choose your option</option>
          <option *ngFor="let contextSource of contextSources" [ngValue]="contextSource">{{contextSource.name}}</option>
        </select>
        <label>context Source</label>
      </div>
      <!-- cv -->
      <div class="input-field col s12">
        <select name="cv" required [(ngModel)]="communityLine.instrument">
          <option value="" disabled selected>Choose your option</option>
          <option *ngFor="let cv of cvs" [ngValue]="cv">{{cv.name}}</option>
        </select>
        <label>CV</label>
      </div>
      <!-- value -->
      <div class="input-field col s12">
        <input type="number" name="value" id="valueInput" [(ngModel)]="communityLine.value" required>
        <label>Line value</label>
      </div>
      <!-- community partner  -->
      <div class="input-field col s12">
        <select name="cPartner" required [(ngModel)]="communityLine.communityPartner">
          <option value="" disabled selected>Choose your option</option>
          <option *ngFor="let communityPartner of communityPartners" [ngValue]="communityPartner" [attr.data-icon]="communityPartner.logo">
            {{communityPartner.name}}</option>
        </select>
        <label>Community partner</label>
      </div>

      <!-- color -->
      <div class="input-field col s12" style="margin-bottom: 40px; margin-top: -10px">
        <label>
          <input type="checkbox" name="color" id="color" (change) = "useCSColor()" [(ngModel)]="useSameCSColor" [disabled]="communityLine.contextSource===null">
          <span>Use same context source color </span>
        </label>
      </div>
      <p style="margin-left: 11px" *ngIf="showWarning">Warning: This context doesn't have any color linked</p>
    </div>

    <div class="col s6">
      <ul class="collapsible" id="collapsible-colors">
        <li class="active">
          <div class="collapsible-header"><i class="material-icons">filter_drama</i>Choose your color</div>
          <div class="collapsible-body" [ngClass]="{'disabled': useSameCSColor }">
            <i *ngFor="let traceColor of traceColors" class="material-icons medium cursorIcon"
              [style.color]="traceColor.mainColor" (click)="changeTraceColor(traceColor)">linear_scale</i>
          </div>
        </li>
      </ul>
    </div>

    <div class="col s6">
        <div id="plot"></div>
  </div>
  </div>


  <div class="row">
    <div class="col s12 m2 l2 xl2">
      <button type="submit" class="waves-effect waves-teal btn" [disabled]="!communityForm.form.valid">Save community
        line</button>
    </div>
    <div class="col s12 m2 l2 xl2">
      <button style="margin-left: -50px" type="button" class="btn amber waves-effect waves-light"
        (click)="closeForm()">Go back</button>
    </div>
  </div>
</form>
