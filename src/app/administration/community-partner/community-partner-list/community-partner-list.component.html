<a class="btn-floating waves-effect waves-light right" (click)="openFormEvent()">
  <i class="material-icons">add</i>
</a>
<table>
<thead>
  <tr>
    <th>
      Name
    </th>
    <th>
      Email
    </th>
    <th>
      Logo
    </th>
    <th>
      Web site
    </th>
  </tr>
</thead>
<tbody>
  <tr *ngFor="let partner of partners">
    <td>{{partner.name}}</td>
    <td> <a href="mailto:{{partner.email}}"></a>{{partner.email}}</td>
    <td><img [src]="partner.logo" [alt]="partner.logo"></td>
    <td> <a [href]="partner.webPage">{{partner.webPage}}</a></td>
  </tr>
</tbody>
</table>
