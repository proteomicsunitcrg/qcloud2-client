<p (mouseenter)="showActions=true" (mouseleave)="showActions=false" class="truncate">
  <label>
    <input name="group1" type="radio" checked />
    <span class="truncate">{{problem.name}} <span class="qccv">{{problem.qccv}}</span></span>
  </label>
  <span [class.hide-action]="!showActions">
    <span (click)="enableDisable(problem.apiKey)">
      <i *ngIf="problem.active" class="tiny action">Disable</i>
      <i *ngIf="!problem.active" class="tiny action">Enable</i>
    </span>
    <i class="material-icons tiny action" (click)="doEdit()">edit</i>
    <i class="material-icons tiny action" (click)="doDelete()">delete</i>
  </span>
</p>
