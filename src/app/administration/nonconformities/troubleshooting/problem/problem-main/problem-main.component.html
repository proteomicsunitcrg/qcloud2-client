<div class="col s12 m10 l10 xl10 z-depth-2">
    <div class="row z-depth-0 green-background  ">
      <div class="col s12 m12 l12 xl12">
        <h4>Problems management</h4>
      </div>
    </div>
    <div class="row">
      <div class="col s12 m12 l12 xl12">
        <a class="btn-floating waves-effect waves-light right" (click)="newProblem()">
          <i class="material-icons">add</i>
        </a>
        <table class="highlight">
            <thead>
                <tr>
                    <th>
                        Name
                    </th>
                    <th>
                        Description
                    </th>
                    <th>
                        QCCV
                    </th>
                    <th>
                        Enabled
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let problem of allProblems" (click)="edit(problem.apiKey)" style="cursor: pointer;">
                    <td>
                        {{problem.name}}
                    </td>
                    <td>
                        {{problem.description}}
                    </td>
                    <td>
                        {{problem.qccv}}
                    </td>
                    <td>
                        {{problem.active}}
                    </td>
                </tr>
            </tbody>
        </table>
      </div>
    </div>
  </div>
