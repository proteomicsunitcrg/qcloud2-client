<div class="row" *ngIf="isSampleTypeSelected">
  <div class="col s12 m12 l12 xl12">
    <!-- new peptide form -->
    <div class="row">
      <div class="col s12 m12 l12 xl12" *ngIf="isNewPeptide">
        <app-new-peptide-form [isoSampleType]="isoSampleType" (newPeptide)="sendPeptideToList($event)"></app-new-peptide-form>

      </div>
    </div>
    <!-- peptide selector -->
    <div class="row" *ngIf="!isNewPeptide">
      <div class="col s12 m12 l12 xl12">
        <ul class="collection">
          <a class="collection-item blue-grey-text text-darken-1" *ngFor="let peptide of peptides" (click)="doSelectPeptide(peptide)">
            {{peptide.name}}
          </a>
          <div class="divider"></div>
          <li class="collection-item lime lighten-5">
            <div class="new-peptide" (click)="addNewPeptide()">New peptide
              <span class="secondary-content">
                <i class="material-icons blue-grey-text text-darken-1">add</i>
              </span>
            </div>
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>
