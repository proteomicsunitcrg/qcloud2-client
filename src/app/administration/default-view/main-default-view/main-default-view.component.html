<div class="col s12 m10 l10 xl10 z-depth-2">
  <div class="row z-depth-0 blue-grey darken-1">
    <div class="col s12 m12 l12 xl12">
      <h4>Default views management</h4>
    </div>
  </div>
  <div class="col s3 m3 l3 xl3">
    <div class="row">
      <div class="col s12">
        <app-chart-cvs></app-chart-cvs>
      </div>
    </div>
    <div class="row">
      <div class="col s12">
        <button type="button" class="waves-effect waves-light btn-large" [disabled]="!selectedCV || selectedSampleTypeCategory==null" (click)="goToDefaultChartEdit()">
          Create new default view
          <i class="material-icons right">send</i>
        </button>
        <p *ngFor="let sampleTypeCategory of sampleTypeCategories">
          <label>
            <input name="sampleTypeCategoriesRadio" [value]="sampleTypeCategory" type="radio" [(ngModel)]="selectedSampleTypeCategory"/>
            <span>{{sampleTypeCategory.name}}</span>
          </label>
        </p>        
      </div>
    </div>
  </div>
  <div class="col s9 m9 l9 xl9">
    <app-view-list></app-view-list>
  </div>
</div>
