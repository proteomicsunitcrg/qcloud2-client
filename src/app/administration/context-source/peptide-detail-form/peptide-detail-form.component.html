<h5>{{formTitle}}</h5>
<form (ngSubmit)="onSubmit(); peptideForm.reset()" #peptideForm="ngForm" ngNativeValidate autocomplete="off">
  <div class="row">
  <div class="input-field">
    <input #peptideNameBox type="text" name="name" [(ngModel)]="formData.currentPeptide.name" class="validate" id="name" validate required>
    <label for="name">Peptide name</label>
  </div>
  <div class="input-field">
    <input type="text" #sequenceBox name="sequence" [(ngModel)]="formData.currentPeptide.sequence" class="validate" id="sequence" validate required>
    <label for="sequence">Sequence</label>
  </div>
  <div class="input-field">
    <input type="text" #abbreviatedSequenceBox name="abbreviatedSequence" [(ngModel)]="formData.currentPeptide.abbreviatedSequence" class="validate" id="abbreviatedSequence" validate
      required>
    <label for="abbreviatedSequence">Abbreviated sequence</label>
  </div>
</div>
  <div class="input-field">
    <button type="submit" class="waves-effect waves-light btn blue-grey darken-1">{{formSubmitButton}}</button>
  </div>
</form>
