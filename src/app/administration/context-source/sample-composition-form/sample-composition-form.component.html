<h5>Sample composition</h5>
<div class="row" *ngFor="let sampleType of sampleTypes">
  <div class="col s2 m2 l2 xl2">
    <p>
      <label>
        <input type="checkbox" name="sampleType{{sampleType.qualityControlControlledVocabulary}}"
          [(ngModel)]="compositionInputs[sampleType.qualityControlControlledVocabulary]" />
        <span>{{sampleType.name}}</span>
      </label>
    </p>
  </div>
  <div class="col s10 m10 l10 xl10">
    <input type="number" [(ngModel)]="compositions[sampleType.qualityControlControlledVocabulary].concentration"
      name="concentration{{sampleType.qualityControlControlledVocabulary}}"
      [disabled]="!compositionInputs[sampleType.qualityControlControlledVocabulary]" />
    <label for="concentration{{sampleType.qualityControlControlledVocabulary}}">Concentration in {{sampleType.name}}
    </label>
  </div>
</div>
