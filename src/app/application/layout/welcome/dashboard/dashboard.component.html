<div class="row">
  <div class="input-field col s2">
    <input id="filename" type="text" [(ngModel)]="filename">
    <label for="filename">Filename</label>
  </div>
  <div class="input-field col s2">
    <select [(ngModel)]="labsystem" name="labsystem">
      <option value="" selected>None</option>
      <option [value]="ls.apiKey" *ngFor="let ls of labSystems">{{ls.name}}</option>
    </select>
    <label>Labsystem</label>
  </div>
  <div class="input-field col s2">
    <select [(ngModel)]="sampleType" name="sampleType">
      <option value="" selected>All</option>
      <option value="QC:0000005">BSA</option>
      <option value="QC:0000006">Hela</option>
      <option value="QC:0000009">QC4L</option>
    </select>
    <label>Sample type</label>
  </div>
  <div class="col s1" style="margin-top: 20px;">
    <button class="btn" (click)="getPage()">Find</button>
  </div>
</div>
<!-- <div class="row">
  <div class="col s2" style="margin-top: 20px;">
    <button class="btn" (click)="cleanFilters()">Clean filters</button>
  </div>
</div> -->
<table>
  <thead>
    <tr>
      <th>
        Filename
      </th>
      <th>
        Adquisition date
      </th>
      <th>
        Labsystem
      </th>
      <th>
        Sample type
      </th>
      <th>
        Fast check
      </th>
      <th>
        Data
      </th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let file of collection.data">
      <td>
        {{file.filename}}
      </td>
      <td>
        {{file.creationDate}}
      </td>
      <td>
        {{file.labSystem.name}}
      </td>
      <td>
        {{file.sampleType.name}}
      </td>
      <td>
        Okk
      </td>
      <td>
        <button class="btn">View</button>
      </td>
    </tr>
  </tbody>
</table>
