<div class="row" *ngIf = "message.show">
  <div class="col s6 offset-s3 z-depth-1" id="panell">
    <h5 class="title titleWarning" *ngIf = "message.messageType === 'warning'">{{message.title}}</h5>
    <h5 class="title titleError" *ngIf = "message.messageType === 'error'">{{message.title}}</h5>
    <h5 class="title titleMessage" *ngIf = "message.messageType === 'message'">{{message.title}}</h5>
    <!-- <h5 class="title titleMessage">{{message.title}}</h5> -->
    <p [innerHTML]="message.message" class="messageText"></p>
  </div>
</div>
<div class="row">
  <div class="col s12">
    <h1 class="center-align">Welcome to QCloud2.0</h1>
  </div>
</div>
<div class="row">
  <div class="col xl4 s12 m12 l6" *ngFor="let video of videoLinks">
    <div class="card">
      <div class="card-image">
        <iframe width="560" height="315" [src]="sanitizer.bypassSecurityTrustResourceUrl(video.link)" frameborder="0"
          allowfullscreen>
        </iframe>
      </div>
      <div class="card-action">
        <p href="#" class="videoTitle">{{video.title}}</p>
      </div>
    </div>
  </div>
</div>
