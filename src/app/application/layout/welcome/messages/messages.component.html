<ng-container *ngFor="let message of allMessages">
  <div class="row" style="margin-right: 50px; margin-left: 50px;">
    <div class=" z-depth-1" id="panell">
      <h5 class="title titleWarning" *ngIf="message.type === 'warning'">{{message.title}}</h5>
      <h5 class="title titleError" *ngIf="message.type === 'error'">{{message.title}}</h5>
      <h5 class="title titleMessage" *ngIf="message.type === 'message'">{{message.title}}</h5>
      <p [innerHTML]="message.message" class="messageText"></p>
    </div>
  </div>
</ng-container>
