<ul class="collection z-depth-1" style="min-height: 100vh">
  <li class="collection-item">
    <h5>Annotation</h5>
    <span>[Go back]</span>
  </li>
  <li class="collection-item">
    <!-- Calendar -->
    <p *ngIf="file">{{file.creationDate}}</p>
  </li>
  <li *ngFor="let type of troubleshootingTypes()">
    <app-annotation-selector [troubleshootingType]="type"></app-annotation-selector>
  </li>
  <li>
    <app-annotation-list [file]="file"></app-annotation-list>
  </li>
</ul>
