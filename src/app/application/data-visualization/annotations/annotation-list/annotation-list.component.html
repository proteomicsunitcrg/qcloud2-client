<div class="row" *ngIf="annotation">
  <div class="col s12">
    <input type="text" name="description" id="description" [(ngModel)]="annotation.description" />
    <label for="description">Additional information</label>
  </div>
</div>
<div class="row">
  <div class="col s12">
    <button type="button" class="waves-effect waves-light btn" [disabled]="itemListLength()===0"
      (click)="saveTroubleshooting()" *ngIf="!updating">save</button>

    <button type="button" class="waves-effect waves-light btn" [disabled]="itemListLength()===0"
      (click)="updateTroubleshooting()" *ngIf="updating">Update</button>

    <button type="button" class="waves-effect waves-light btn" (click)="deleteTroubleshooting()"
      *ngIf="updating">Delete</button>
  </div>
</div>
<div class="row" *ngFor="let item of items | keyvalue">
  <div class="col s12">
    <app-annotation-list-item *ngFor="let troubleshooting of item.value" [troubleshooting]="troubleshooting"
      [type]="item.key"></app-annotation-list-item>
  </div>
</div>
