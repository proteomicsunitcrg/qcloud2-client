<div class="row">
  <div class="col s12">
    <button type="button" class="waves-effect waves-light btn" [disabled]="itemListLength()===0" (click)="saveTroubleshooting()">save</button>
  </div>
</div>
<div class="row" *ngFor="let item of items | keyvalue">
  <div class="col s12">
    <app-annotation-list-item *ngFor="let troubleshooting of item.value" [troubleshooting]="troubleshooting" [type]="item.key"></app-annotation-list-item>
  </div>
</div>
