<h5>Default view</h5>
<form (ngSubmit)="onSubmit()" #defaultViewForm="ngForm">
  <div class="row">
    <div class="input-field col s12">
      <p>
        <label>
          <input name="view_type" type="radio" [value]="true" [(ngModel)]="defaultView"
            (change)="updateDefaultView()" />
          <span>Default view</span>
        </label>
      </p>
      <p>
        <label>
          <input name="view_type" type="radio" [value]="false" [(ngModel)]="defaultView"
            (change)="updateDefaultView()" />
          <span>Custom view</span>
        </label>
      </p>
    </div>
  </div>
  <div class="row" *ngIf="!defaultView">
    <div class="row">
      <div class="input-field col s12">
        <div class="switch">
          <label>
            Instrument views
            <input type="checkbox" [(ngModel)]="customViews" name="view_type" (change)="updateSelect()">
            <span class="lever"></span>
            Custom views
          </label>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="input-field col s12">
        <select name="view_list" id="view_list" [(ngModel)]="selectedView.apiKey">
          <option *ngFor="let view of viewsList" [value]="view.apiKey">{{view.name}}</option>
        </select>
        <label>Materialize Select</label>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="input-field col s12">
      <button class="btn waves-effect waves-light" type="submit" name="action">Submit
        <i class="material-icons right">send</i>
      </button>
    </div>
  </div>

</form>
